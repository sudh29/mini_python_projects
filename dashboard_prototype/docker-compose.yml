# ═══════════════════════════════════════════════════════════════
# RPA Orchestration Platform — Docker Compose
# ═══════════════════════════════════════════════════════════════
# Full local development stack.
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f api    # Follow API logs
#   docker-compose down           # Stop all services

services:
  # ── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rpa-postgres
    environment:
      POSTGRES_DB: rpa_platform
      POSTGRES_USER: rpa
      POSTGRES_PASSWORD: rpa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpa -d rpa_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Broker + Cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rpa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Control Plane ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpa-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://rpa:rpa_dev_password@postgres:5432/rpa_platform"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      SECRET_KEY: "docker-dev-secret-key"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      ARTIFACT_STORAGE_PATH: "/app/artifacts"
      INTERNAL_API_BASE: "http://api:8000"
      INTERNAL_API_KEY: "internal-worker-key"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - artifacts_data:/app/artifacts

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpa-worker
    command: celery -A app.celery_app:celery_app worker --loglevel=info --queues=bots --concurrency=2
    environment:
      DATABASE_URL: "postgresql+asyncpg://rpa:rpa_dev_password@postgres:5432/rpa_platform"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      INTERNAL_API_BASE: "http://api:8000"
      INTERNAL_API_KEY: "internal-worker-key"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rpa-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: rpa-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/rpa_overview.json"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana

  # ── React Dashboard ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rpa-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      - VITE_API_BASE=http://localhost:8000

volumes:
  postgres_data:
  artifacts_data:
  prometheus_data:
  grafana_data:
